<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0b0b0b" />
    <meta http-equiv="refresh" content="1;url=https://maxlien.shop/admin/dashboard" />
    <title>Painel Maxlien</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #0b0b0b;
        color: #f9fafb;
        font-family: Arial, sans-serif;
      }

      .shell {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .box {
        width: min(440px, 100%);
        border: 1px solid #242424;
        border-radius: 10px;
        background: #121212;
        padding: 22px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0 0 18px;
        color: #b9b9b9;
        line-height: 1.45;
      }

      a {
        display: inline-block;
        padding: 12px 16px;
        border-radius: 8px;
        background: #166534;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
    <script>
      window.location.replace("https://maxlien.shop/admin/dashboard");
    </script>
  </head>
  <body>
    <main class="shell">
      <section class="box">
        <h1>Painel Maxlien</h1>
        <p>Redirecionando para o painel oficial conectado aos leads, status e Pixel.</p>
        <a href="https://maxlien.shop/admin/dashboard">Abrir painel oficial</a>
      </section>
    </main>
  </body>
</html>
